name: Send Daily Notifications

on:
  # ⏸️ 每日排程暫時停用（Firebase 移轉期間）。要恢復時把下面兩行取消註解，
  #    並確認 GitHub Secrets 的 FIREBASE_SERVICE_ACCOUNT / FIREBASE_PROJECT_ID 已指向新專案 team-scheduler-dc7ce。
  # schedule:
  #   # 01:00 UTC = 09:00 Taiwan time (UTC+8)
  #   - cron: '0 1 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install firebase-admin

      - name: Run notification script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: python scripts/send_notifications.py
